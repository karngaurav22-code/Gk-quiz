name: Daily News Update

on:
  schedule:
    - cron: '30 2 * * *'
  workflow_dispatch:

jobs:
  update-news:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install packages
        run: pip install requests feedparser

      - name: Run news script
        run: python fetch_news.py

      - name: Save changes
        run: |
          git config --global user.name "NewsBot"
          git config --global user.email "bot@news.com"
          git add .
          git diff --staged --quiet || git commit -m "Daily news update"
          git push
