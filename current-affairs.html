<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Current Affairs | GS Practice</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<style>
.ca-page{max-width:800px;margin:0 auto;padding:24px 16px 60px;}
.ca-page-title{font-family:'Playfair Display',serif;font-size:28px;font-weight:900;margin-bottom:6px;}
.ca-page-date{color:var(--text2);font-size:13px;margin-bottom:28px;}
.ca-news-card{background:var(--card);border:1px solid var(--border);border-left:3px solid #6366F1;border-radius:12px;padding:16px 18px;margin-bottom:12px;font-size:15px;line-height:1.7;color:var(--text);}
.ca-back{display:inline-block;margin-bottom:20px;color:var(--blue);font-size:13px;text-decoration:none;font-weight:600;}
</style>
</head>
<body>
<div class="ca-page">
  <a class="ca-back" href="index.html">← Wapas Jao</a>
  <div class="ca-page-title">📰 Aaj Ki Current Affairs</div>
  <div class="ca-page-date" id="ca-page-date"></div>
  <div id="ca-news-list"></div>
</div>
<script>
const today = new Date();
const d = String(today.getDate()).padStart(2,'0');
const m = today.toLocaleString('hi-IN',{month:'long'});
const y = today.getFullYear();
document.getElementById('ca-page-date').textContent = d+' '+m+' '+y;

// Fetch karo current-affairs.js se same news
fetch('js/current-affairs.js')
  .then(r => r.text())
  .then(code => {
    const match = code.match(/const NEWS = (\[.*?\]);/s);
    if(match){
      const news = JSON.parse(match[1]);
      document.getElementById('ca-news-list').innerHTML = 
        news.map(n => `<div class="ca-news-card">📌 ${n}</div>`).join('');
    }
  })
  .catch(()=>{
    document.getElementById('ca-news-list').innerHTML = 
      '<div class="ca-news-card">News load nahi hui, thodi der mein try karein.</div>';
  });
</script>
</body>
</html>
