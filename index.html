<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BioQuiz — UPSC Biotechnology Practice</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,700;0,900;1,700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0D1117; --card: #161B22; --card2: #1C2128; --card3: #21262D;
  --border: rgba(255,255,255,0.08); --border2: rgba(255,255,255,0.04);
  --green: #3FB950; --green-dim: rgba(63,185,80,0.12);
  --red: #F85149; --red-dim: rgba(248,81,73,0.12);
  --blue: #58A6FF; --blue-dim: rgba(88,166,255,0.12);
  --yellow: #E3B341; --yellow-dim: rgba(227,179,65,0.12);
  --purple: #BC8CFF; --purple-dim: rgba(188,140,255,0.12);
  --text: #E6EDF3; --text2: #8B949E; --text3: #3D444D;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body { background: var(--bg); min-height: 100vh; font-family: 'Sora', sans-serif; color: var(--text); }

/* GLOW BG */
body::before {
  content: ''; position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background: radial-gradient(ellipse at 15% 15%, rgba(88,166,255,0.05) 0%, transparent 55%),
              radial-gradient(ellipse at 85% 85%, rgba(63,185,80,0.04) 0%, transparent 55%);
}

/* ── SCREENS ── */
.screen { display: none; position: relative; z-index: 1; }
.screen.active { display: block; }

/* ══════════════════ AUTH SCREEN ══════════════════ */
#authScreen {
  min-height: 100vh; display: none;
  align-items: center; justify-content: center; padding: 20px;
}
#authScreen.active { display: flex; }
.auth-box {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 20px; padding: 36px; width: 100%; max-width: 400px;
  box-shadow: 0 24px 64px rgba(0,0,0,0.6);
  animation: fadeUp .4s ease;
}
.auth-logo { text-align: center; margin-bottom: 28px; }
.auth-logo-icon {
  width: 52px; height: 52px; border-radius: 14px; margin: 0 auto 12px;
  background: linear-gradient(135deg, #58A6FF, #3FB950);
  display: flex; align-items: center; justify-content: center; font-size: 24px;
}
.auth-logo-name { font-family: 'Playfair Display', serif; font-size: 24px; font-weight: 900; }
.auth-logo-name span { color: var(--blue); }
.auth-logo-sub { font-size: 12px; color: var(--text2); margin-top: 4px; letter-spacing: 1px; text-transform: uppercase; }

.auth-tabs { display: flex; gap: 0; margin-bottom: 28px; border-radius: 10px; overflow: hidden; border: 1px solid var(--border); }
.auth-tab {
  flex: 1; padding: 10px; text-align: center; font-size: 13px; font-weight: 600;
  cursor: pointer; background: transparent; border: none; color: var(--text2);
  transition: all .2s; font-family: 'Sora', sans-serif;
}
.auth-tab.active { background: var(--blue-dim); color: var(--blue); }

.form-group { margin-bottom: 16px; }
.form-label { font-size: 11px; color: var(--text2); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 8px; display: block; font-weight: 600; }
.form-input {
  width: 100%; padding: 12px 14px;
  background: var(--card2); border: 1px solid var(--border);
  border-radius: 10px; color: var(--text); font-size: 14px; outline: none;
  transition: border-color .2s; font-family: 'Sora', sans-serif;
}
.form-input:focus { border-color: rgba(88,166,255,0.5); }
.form-input::placeholder { color: var(--text3); }

.auth-btn {
  width: 100%; padding: 13px; border-radius: 10px; border: none;
  background: linear-gradient(135deg, #58A6FF, #3FB950);
  color: #0D1117; font-size: 14px; font-weight: 700;
  cursor: pointer; transition: all .2s; margin-top: 4px;
  font-family: 'Sora', sans-serif;
}
.auth-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(88,166,255,0.3); }
.auth-msg { font-size: 12px; text-align: center; margin-top: 12px; min-height: 18px; }
.auth-msg.error { color: var(--red); }
.auth-msg.success { color: var(--green); }

/* ══════════════════ MAIN APP ══════════════════ */
#appScreen { min-height: 100vh; }

/* NAVBAR */
nav {
  position: sticky; top: 0; z-index: 200;
  background: rgba(13,17,23,0.92); backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  padding: 0 20px; height: 56px;
  display: flex; align-items: center; gap: 12px;
}
.nav-logo { font-family: 'Playfair Display', serif; font-size: 18px; font-weight: 900; margin-right: auto; }
.nav-logo span { color: var(--blue); }
.nav-btn {
  padding: 6px 14px; border-radius: 8px; font-size: 12px; font-weight: 600;
  cursor: pointer; border: none; transition: all .2s; font-family: 'Sora', sans-serif;
}
.nav-tab { background: transparent; color: var(--text2); border: 1px solid transparent; }
.nav-tab:hover { color: var(--text); border-color: var(--border); }
.nav-tab.active { background: var(--blue-dim); color: var(--blue); border-color: rgba(88,166,255,0.3); }
.nav-user {
  display: flex; align-items: center; gap: 8px;
  padding: 5px 12px; border-radius: 20px;
  background: var(--card2); border: 1px solid var(--border);
}
.nav-avatar {
  width: 24px; height: 24px; border-radius: 50%;
  background: linear-gradient(135deg, #58A6FF, #3FB950);
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 700; color: #0D1117;
}
.nav-uname { font-size: 12px; font-weight: 600; max-width: 80px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.logout-btn { background: transparent; color: var(--text3); border: none; font-size: 11px; cursor: pointer; padding: 2px 6px; border-radius: 4px; transition: color .2s; font-family: 'Sora', sans-serif; }
.logout-btn:hover { color: var(--red); }

/* TAB PAGES */
.tab-page { display: none; max-width: 800px; margin: 0 auto; padding: 24px 16px 60px; }
.tab-page.active { display: block; animation: fadeUp .3s ease; }

/* ══════ HOME TAB ══════ */
.home-banner {
  background: linear-gradient(135deg, rgba(88,166,255,0.1), rgba(63,185,80,0.08));
  border: 1px solid rgba(88,166,255,0.2); border-radius: 16px;
  padding: 24px; margin-bottom: 24px;
  display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
}
.home-banner-left { flex: 1; min-width: 160px; }
.home-welcome { font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 700; margin-bottom: 4px; }
.home-welcome em { color: var(--blue); font-style: normal; }
.home-welcome-sub { font-size: 13px; color: var(--text2); }
.stat-chips { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 14px; }
.stat-chip {
  padding: 6px 14px; border-radius: 20px; font-size: 12px; font-weight: 600;
  display: flex; align-items: center; gap: 6px;
}
.chip-green { background: var(--green-dim); color: var(--green); border: 1px solid rgba(63,185,80,0.25); }
.chip-blue { background: var(--blue-dim); color: var(--blue); border: 1px solid rgba(88,166,255,0.25); }
.chip-yellow { background: var(--yellow-dim); color: var(--yellow); border: 1px solid rgba(227,179,65,0.25); }

/* TOPIC GRID */
.section-header { font-size: 11px; color: var(--text3); letter-spacing: 2px; text-transform: uppercase; font-weight: 600; margin-bottom: 14px; margin-top: 28px; display: flex; align-items: center; gap: 12px; }
.section-header::after { content: ''; flex: 1; height: 1px; background: var(--border); }

.topic-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px,1fr)); gap: 10px; margin-bottom: 20px; }
.topic-card {
  background: var(--card); border: 1px solid var(--border); border-radius: 12px;
  padding: 16px; cursor: pointer; transition: all .2s; position: relative; overflow: hidden;
}
.topic-card::after { content: ''; position: absolute; inset: 0; opacity: 0; background: linear-gradient(135deg, rgba(88,166,255,0.08), transparent); transition: opacity .3s; }
.topic-card:hover { border-color: rgba(88,166,255,0.4); transform: translateY(-2px); }
.topic-card:hover::after { opacity: 1; }
.topic-card.sel { border-color: var(--blue); background: var(--blue-dim); }
.topic-card.sel::after { opacity: 1; }
.tc-check-mark { position: absolute; top: 8px; right: 8px; width: 18px; height: 18px; border-radius: 50%; background: var(--blue); color: #0D1117; display: none; align-items: center; justify-content: center; font-size: 10px; font-weight: 800; }
.topic-card.sel .tc-check-mark { display: flex; }
.tc-icon { font-size: 22px; margin-bottom: 8px; }
.tc-name { font-size: 12px; font-weight: 600; margin-bottom: 2px; }
.tc-cnt { font-size: 11px; color: var(--text2); }

/* SETTINGS */
.settings-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 18px; margin-bottom: 20px; display: flex; gap: 20px; flex-wrap: wrap; }
.sg { flex: 1; min-width: 120px; }
.sg-lbl { font-size: 10px; color: var(--text3); letter-spacing: 2px; text-transform: uppercase; font-weight: 600; margin-bottom: 10px; }
.pill-row { display: flex; gap: 6px; flex-wrap: wrap; }
.pill { padding: 6px 12px; border-radius: 8px; border: 1px solid var(--border); background: transparent; color: var(--text2); font-size: 12px; font-weight: 500; cursor: pointer; transition: all .2s; font-family: 'Sora', sans-serif; }
.pill:hover { border-color: rgba(88,166,255,0.4); color: var(--text); }
.pill.on { border-color: var(--blue); color: var(--blue); background: var(--blue-dim); }

.start-quiz-btn {
  width: 100%; padding: 14px; border-radius: 12px; border: none;
  background: linear-gradient(135deg, #58A6FF, #3FB950);
  color: #0D1117; font-size: 15px; font-weight: 800;
  cursor: pointer; transition: all .2s; letter-spacing: -0.2px;
  font-family: 'Sora', sans-serif;
}
.start-quiz-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(88,166,255,0.35); }
.start-quiz-btn:disabled { opacity: .3; cursor: not-allowed; transform: none !important; box-shadow: none; }

/* ══════ QUIZ TAB ══════ */
.q-topbar { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
.q-topic-pill { padding: 4px 12px; border-radius: 20px; background: var(--blue-dim); color: var(--blue); border: 1px solid rgba(88,166,255,0.25); font-size: 11px; font-weight: 700; }
.q-ptext { font-size: 12px; color: var(--text2); margin-left: auto; }
.progress-bar { height: 4px; background: var(--card3); border-radius: 2px; margin-bottom: 20px; overflow: hidden; }
.progress-fill { height: 100%; border-radius: 2px; background: linear-gradient(90deg, var(--blue), var(--green)); transition: width .4s ease; }
.lvl-row { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
.lvl-badge { padding: 3px 10px; border-radius: 6px; font-size: 10px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; }
.lv-easy { background: var(--green-dim); color: var(--green); border: 1px solid rgba(63,185,80,0.25); }
.lv-medium { background: var(--blue-dim); color: var(--blue); border: 1px solid rgba(88,166,255,0.25); }
.lv-hard { background: var(--yellow-dim); color: var(--yellow); border: 1px solid rgba(227,179,65,0.25); }
.lv-upsc { background: var(--red-dim); color: var(--red); border: 1px solid rgba(248,81,73,0.25); }

.q-card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 22px; margin-bottom: 14px; }
.q-text { font-size: 16px; line-height: 1.7; font-weight: 500; }
.opts { display: flex; flex-direction: column; gap: 9px; margin-bottom: 14px; }
.opt-btn {
  display: flex; align-items: center; gap: 12px;
  padding: 13px 15px; border-radius: 10px; border: 1px solid var(--border);
  background: var(--card2); color: var(--text2); font-size: 13px; text-align: left;
  cursor: pointer; transition: all .2s; width: 100%; font-family: 'Sora', sans-serif;
}
.opt-btn:hover:not(:disabled) { border-color: rgba(88,166,255,0.4); color: var(--text); background: var(--blue-dim); }
.opt-btn.sel { border-color: var(--blue); color: var(--blue); background: var(--blue-dim); }
.opt-btn.correct { border-color: var(--green); color: var(--green); background: var(--green-dim); }
.opt-btn.wrong { border-color: var(--red); color: var(--red); background: var(--red-dim); }
.opt-btn.dim { opacity: 0.3; }
.opt-ltr { width: 26px; height: 26px; border-radius: 7px; border: 1px solid currentColor; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 800; flex-shrink: 0; }

.expl-box { display: none; padding: 14px 16px; border-radius: 10px; background: rgba(63,185,80,0.06); border: 1px solid rgba(63,185,80,0.2); margin-bottom: 14px; }
.expl-lbl { font-size: 10px; color: var(--green); letter-spacing: 1.5px; text-transform: uppercase; font-weight: 700; margin-bottom: 6px; }
.expl-text { font-size: 13px; color: var(--text2); line-height: 1.65; }

.act-row { display: flex; gap: 10px; }
.btn-check { flex: 1; padding: 12px; border-radius: 10px; border: none; background: linear-gradient(135deg,#58A6FF,#3FB950); color: #0D1117; font-size: 13px; font-weight: 700; cursor: pointer; font-family: 'Sora',sans-serif; transition: opacity .2s; }
.btn-check:hover { opacity: .88; }
.btn-next { flex: 1; padding: 12px; border-radius: 10px; border: 1px solid var(--border); background: var(--card2); color: var(--text2); font-size: 13px; font-weight: 500; cursor: pointer; font-family: 'Sora',sans-serif; transition: all .2s; }
.btn-next:hover { border-color: rgba(88,166,255,0.4); color: var(--text); }

/* RESULTS */
#resultsPanel { display: none; text-align: center; padding: 20px 0; animation: fadeUp .4s ease; }
.res-emoji { font-size: 56px; display: block; margin-bottom: 12px; }
.res-title { font-family: 'Playfair Display', serif; font-size: 30px; font-weight: 900; margin-bottom: 6px; }
.res-sub { color: var(--text2); font-size: 13px; margin-bottom: 28px; }
.score-ring-wrap { position: relative; width: 140px; margin: 0 auto 24px; }
.score-ring-svg { width: 140px; height: 140px; transform: rotate(-90deg); }
.ring-bg { fill: none; stroke: rgba(255,255,255,0.05); stroke-width: 8; }
.ring-fg { fill: none; stroke: url(#rg); stroke-width: 8; stroke-linecap: round; stroke-dasharray: 389.6; stroke-dashoffset: 389.6; transition: stroke-dashoffset 1.2s ease; }
.ring-inner { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
.ring-pct { font-family: 'Playfair Display', serif; font-size: 28px; font-weight: 900; color: var(--green); }
.ring-lbl { font-size: 9px; color: var(--text3); letter-spacing: 2px; text-transform: uppercase; }
.res-stats { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; margin-bottom: 24px; }
.rs { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 14px 20px; text-align: center; }
.rs-num { font-family: 'Playfair Display', serif; font-size: 26px; font-weight: 900; display: block; margin-bottom: 3px; }
.rs-lbl { font-size: 11px; color: var(--text2); }
.res-btns { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin-bottom: 32px; }
.btn-retry { padding: 12px 24px; border-radius: 10px; border: none; background: linear-gradient(135deg,#58A6FF,#3FB950); color: #0D1117; font-size: 13px; font-weight: 700; cursor: pointer; font-family: 'Sora',sans-serif; transition: all .2s; }
.btn-retry:hover { transform: translateY(-1px); }
.btn-home-res { padding: 12px 20px; border-radius: 10px; border: 1px solid var(--border); background: transparent; color: var(--text2); font-size: 12px; cursor: pointer; font-family: 'Sora',sans-serif; transition: all .2s; }
.btn-home-res:hover { border-color: rgba(88,166,255,0.4); color: var(--text); }

/* WRITING CARDS */
.writing-section { text-align: left; border-top: 1px solid var(--border); padding-top: 24px; }
.writing-sec-head { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
.writing-badge-hd { padding: 4px 12px; border-radius: 6px; background: var(--yellow-dim); color: var(--yellow); border: 1px solid rgba(227,179,65,0.25); font-size: 11px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; }
.writing-card { background: var(--card); border: 1px solid var(--border); border-left: 3px solid var(--yellow); border-radius: 12px; padding: 18px; margin-bottom: 10px; }
.w-meta { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
.w-num { font-size: 10px; color: var(--text3); font-weight: 600; }
.w-marks { padding: 2px 9px; border-radius: 8px; background: var(--blue-dim); color: var(--blue); font-size: 10px; font-weight: 700; border: 1px solid rgba(88,166,255,0.2); }
.w-q { font-size: 14px; line-height: 1.7; color: var(--text); margin-bottom: 8px; }
.w-hint { font-size: 11px; color: var(--text3); font-style: italic; line-height: 1.6; }

/* ══════ HISTORY TAB ══════ */
.history-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; flex-wrap: wrap; gap: 12px; }
.history-title { font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 900; }
.clear-btn { padding: 6px 14px; border-radius: 8px; border: 1px solid rgba(248,81,73,0.3); background: var(--red-dim); color: var(--red); font-size: 11px; font-weight: 600; cursor: pointer; font-family: 'Sora',sans-serif; transition: all .2s; }
.clear-btn:hover { background: rgba(248,81,73,0.2); }

.my-stats { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px,1fr)); gap: 10px; margin-bottom: 28px; }
.mstat { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 16px; text-align: center; }
.mstat-val { font-family: 'Playfair Display', serif; font-size: 24px; font-weight: 900; display: block; margin-bottom: 4px; }
.mstat-lbl { font-size: 11px; color: var(--text2); }

.hist-list { display: flex; flex-direction: column; gap: 10px; }
.hist-item {
  background: var(--card); border: 1px solid var(--border); border-radius: 12px;
  padding: 16px; display: flex; align-items: center; gap: 14px; flex-wrap: wrap;
}
.hist-score-ring { width: 44px; height: 44px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 800; border: 2px solid; }
.hist-info { flex: 1; min-width: 100px; }
.hist-topic { font-size: 13px; font-weight: 600; margin-bottom: 3px; }
.hist-meta { font-size: 11px; color: var(--text2); }
.hist-badge { padding: 3px 10px; border-radius: 6px; font-size: 11px; font-weight: 700; }
.hist-date { font-size: 11px; color: var(--text3); margin-left: auto; }

.empty-state { text-align: center; padding: 48px 20px; color: var(--text2); }
.empty-icon { font-size: 40px; margin-bottom: 12px; display: block; }
.empty-text { font-size: 14px; line-height: 1.6; }

/* ══════ LEADERBOARD TAB ══════ */
.lb-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; flex-wrap: wrap; gap: 10px; }
.lb-title { font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 900; }
.lb-note { font-size: 11px; color: var(--text3); margin-bottom: 20px; }

.lb-filter { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 20px; }

.lb-table { background: var(--card); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; }
.lb-row {
  display: flex; align-items: center; gap: 14px; padding: 14px 18px;
  border-bottom: 1px solid var(--border2); transition: background .2s;
}
.lb-row:last-child { border-bottom: none; }
.lb-row:hover { background: var(--card2); }
.lb-row.me { background: var(--blue-dim); border-color: rgba(88,166,255,0.2); }
.lb-rank { width: 32px; text-align: center; font-family: 'Playfair Display', serif; font-size: 18px; font-weight: 900; flex-shrink: 0; }
.rank-1 { color: #FFD700; }
.rank-2 { color: #C0C0C0; }
.rank-3 { color: #CD7F32; }
.lb-avatar { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 800; flex-shrink: 0; color: #0D1117; }
.lb-name { flex: 1; font-size: 14px; font-weight: 600; }
.lb-you { font-size: 10px; color: var(--blue); background: var(--blue-dim); padding: 2px 7px; border-radius: 6px; margin-left: 6
