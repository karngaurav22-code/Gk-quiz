<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GS Practice Platform</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,700;0,900;1,700&display=swap" rel="stylesheet">

</head>

<body>


<!-- AUTH SCREEN -->

<div id="authScreen" class="screen active">

<div class="auth-box">

<div class="auth-logo">

<div class="auth-logo-icon">🎯</div>

<div class="auth-logo-name">
GS <span>Practice</span>
</div>

<div class="auth-logo-sub">
UPSC GS Platform
</div>

</div>



<div class="auth-tabs">

<button class="auth-tab active" onclick="switchAuthTab('login')">
Login
</button>

<button class="auth-tab" onclick="switchAuthTab('register')">
Register
</button>

</div>



<!-- login -->

<div id="loginForm">

<input id="loginUser" placeholder="username">

<input id="loginPass" type="password" placeholder="password">

<button onclick="doLogin()">
Login
</button>

<p id="loginMsg"></p>

</div>



<!-- register -->

<div id="registerForm" style="display:none">

<input id="regName" placeholder="name">

<input id="regUser" placeholder="username">

<input id="regPass" placeholder="password">

<button onclick="doRegister()">
Register
</button>

<p id="registerMsg"></p>

</div>



</div>

</div>


<script src="questions.js"></script>
<script type="module" src="firebase.js"></script>
<script src="script.js"></script>

</body>

</html>
